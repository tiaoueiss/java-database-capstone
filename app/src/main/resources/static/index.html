<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Select Role</title>

    <!-- Favicon -->
    <link rel="icon" href="../assets/images/logo/Logo.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/index.css">
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- Utility and rendering scripts -->
    <script src="../js/util.js" defer></script>
    <script src="../js/render.js" defer></script>

    <!-- Reusable components -->
    <script src="../js/components/header.js" defer></script>
    <script src="../js/components/footer.js" defer></script>
</head>

<body>

<div class="container">
    <div class="wrapper">

        <!-- Header placeholder -->
        <div id="header"></div>

        <!-- Main content -->
        <main class="role-selection">

            <h1>Select Your Role</h1>

            <div class="role-buttons">
                <button id="adminBtn" class="role-btn">Admin</button>
                <button id="patientBtn" class="role-btn">Patient</button>
                <button id="doctorBtn" class="role-btn">Doctor</button>
            </div>

        </main>

        <!-- Footer placeholder -->
        <div id="footer"></div>

    </div>
</div>

<!-- Modal for login forms -->
<div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">

        <button id="closeModal" class="close-btn">✖</button>

        <!-- Dynamic modal content -->
        <div id="modalContent"></div>

    </div>
</div>

<!-- Page logic -->
<script type="module" src="../js/index.js"></script>

</body>
</html>
